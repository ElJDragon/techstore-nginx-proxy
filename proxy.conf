worker_processes  1;

events { worker_connections 1024; }

http {
    server {
        listen 8080;

        location = / {
            default_type application/json;
            return 200 "{\"mensaje\":\"Proxy TechStore 360 activo. Usa /api/, /api/productos o /api/usuarios.\"}";
        }

        location = /api {
            return 301 /api/;
        }

        location ^~ /api/ {
            proxy_intercept_errors on;
            proxy_pass https://react-tech-store-api.onrender.com;
            proxy_ssl_server_name on;
            proxy_ssl_name react-tech-store-api.onrender.com;
            proxy_set_header Host react-tech-store-api.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            error_page 500 502 503 504 = @api_backup;
        }

        location @api_backup {
            internal;
            proxy_pass https://react-tech-store-api-2.onrender.com;
            proxy_ssl_server_name on;
            proxy_ssl_name react-tech-store-api-2.onrender.com;
            proxy_set_header Host react-tech-store-api-2.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
        }
    }
}
