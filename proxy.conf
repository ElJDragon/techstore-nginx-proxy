worker_processes  1;

events { worker_connections 1024; }

http {
    # 1. ACTUALIZADO: 10r/s
    limit_req_zone $http_x_forwarded_for zone=api:10m rate=10r/s;

    split_clients "${http_x_forwarded_for}" $api_backend {
        50%      react-tech-store-api.onrender.com;
        * react-tech-store-api-2.onrender.com;
    }

    server {
        listen 8080;

        # Configurar un resolver porque usaremos variables en proxy_pass
        resolver 8.8.8.8 1.1.1.1 valid=300s;

        location = / {
            default_type application/json;
            return 200 "{\"mensaje\":\"Proxy TechStore 360 activo. Usa /api/, /api/productos o /api/usuarios.\"}";
        }

        location = /api {
            return 301 /api/;
        }

        location ^~ /api/ {
            # 2. ACTUALIZADO: burst=100 permite un pico de hasta 100 peticiones simultáneas
            limit_req zone=api burst=100 nodelay;
            
            proxy_intercept_errors on;
            # proxy_pass a la variable calculada por split_clients
            proxy_pass https://$api_backend;
            
            # Enviar el SNI y Host dinámico correcto para Render
            proxy_ssl_server_name on;
            proxy_ssl_name $api_backend;
            proxy_set_header Host $api_backend;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            
            # Encabezado para comprobar el balanceo
            add_header X-Upstream-Server $api_backend always;

            # Si el servidor elegido por split_clients falla, vamos al respaldo
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            error_page 500 502 503 504 = @api_backup;
        }

        location @api_backup {
            internal;
            # Servidor de rescate seguro (puedes elegir uno fijo o un tercero)
            proxy_pass https://react-tech-store-api-2.onrender.com;
            proxy_ssl_server_name on;
            proxy_ssl_name react-tech-store-api-2.onrender.com;
            proxy_set_header Host react-tech-store-api-2.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            
            add_header X-Upstream-Server "backup-failover" always;
        }
    }
}
